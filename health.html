<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Health Check</title>
    <meta name="robots" content="noindex, nofollow" />
    <style>
      :root {
        color-scheme: light;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: Arial, sans-serif;
        background: #f8f5f0;
        color: #2f241d;
      }

      main {
        padding: 24px 28px;
        border: 1px solid #e4d8ca;
        border-radius: 12px;
        background: #fffdf9;
        text-align: center;
      }

      strong {
        display: block;
        margin-bottom: 8px;
        font-size: 1.1rem;
      }

      p {
        margin: 0;
        color: #7b6254;
      }
    </style>
  </head>
  <body>
    <main>
      <strong>OK</strong>
      <p>TableMint Loyalty OS health check is up.</p>
    </main>
  </body>
</html>
